<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Portfolio</title>
    <link rel="icon" type="image/jpg" href="icons/title_icon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top_menu_bar">
        <div class="menu_left">
            <span><img src="icons/logo.png" alt="Apple Logo" width="12"></span>
            <span><strong>AlexOS</strong></span>
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Go</span>
            <span>Window</span>
            <span>Help</span>
        </div>

        <div class="menu_right">
            <span><img src="icons/sun.png" alt="Display Brightness" width="16"></span>
            <span><img src="icons/airpods.png" alt="AirPods" width="16"></span>
            <span><img src="icons/play.png" alt="Now Playing" width="16"></span>
            <span><img src="icons/light.png" alt="Keyboard Brightness" width="16"></span>
            <span class="battery_group">
                25%
                <img src="icons/battery.png" alt="Battery" width="26">
            </span>
            <span><img src="icons/wifi.png" alt="Wi-Fi" width="16"></span>
            <span><img src="icons/switch.png" alt="Control Center" width="14"></span>
            <span id="clock">Wed 11 Mar 12:00 AM</span>
        </div>
    </nav>

    <div class="desktop_area">
        
        <div class="desktop_icon">
            <img src="icons/IMG_4807.png" alt="Gap Year Folder">
            <span>Gap Year</span>
        </div>

        <div class="desktop_icon">
            <img src="icons/IMG_0107.png" alt="School Stuff Folder">
            <span>School Stuff</span>
        </div>

        <div class="desktop_icon">
            <img src="icons/folder_icon.png" alt="Roblox Projects Folder">
            <span>Roblox Projects</span>
        </div>

    </div>

    <nav class="dock_bar" id="dock">
        <span data-title="🚧Finder🚧" ><img src="icons/finder_icon.png" alt="Finder Icon"></span>
        <span data-title="🚧CV🚧"><img src="icons/notes_icon.png" alt="Notes Icon"></span>
        <span data-title="🚧Photos🚧"><img src="icons/photos_icon.png" alt="Photos Icon"></span>
        <span data-title="Fav Songs"><img src="icons/spotify_icon.png" alt="Spotify Icon"></span>
        <span data-title="Roblox Projects"><img src="icons/roblox_icon.png" alt="Roblox Icon"></span>
        <div class="dock_divider"></div>
        <span data-title="Github" onclick="window.open('https://github.com/AiexProjects', '_blank')"><img src="icons/github_icon.png" alt="Github Icon"></span>
        <span data-title="Linked In" onclick="window.open('https://www.linkedin.com/in/alex-lee-571736358/', '_blank')"><img src="icons/linkedin_icon.png" alt="Linkedin Icon"></span>
        <span data-title="Instagram" onclick="window.open('https://www.instagram.com/aiex.lee/', '_blank')"><img src="icons/instagram_icon.png" alt="Instagram Icon"></span>
        <span data-title="Gmail"><img src="icons/gmail_icon.png" alt="Gmail Icon"></span>
        <div class="dock_divider"></div>
        <span data-title="🚧Junk🚧"><img src="icons/bin_icon.png" alt="Bin Icon"></span>
    </nav>
    <script src="script.js"></script>
</body>
</html>
