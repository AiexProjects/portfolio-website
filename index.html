<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Portfolio</title>
    <link rel="icon" type="image/png" href="icons/title_icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top_menu_bar">
        <div class="menu_left">
            <span><img src="icons/logo.png" alt="Apple Logo" width="12"></span>
            <span><strong>Finder</strong></span>
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Go</span>
            <span>Window</span>
            <span>Help</span>
        </div>

        <div class="menu_right">
            <span><img src="icons/sun.png" alt="Display Brightness" width="16"></span>
            <span><img src="icons/airpods.png" alt="AirPods" width="16"></span>
            <span><img src="icons/play.png" alt="Now Playing" width="16"></span>
            <span><img src="icons/light.png" alt="Keyboard Brightness" width="16"></span>
            <span class="battery_group">
                25%
                <img src="icons/battery.png" alt="Battery" width="26">
            </span>
            <span><img src="icons/wifi.png" alt="Wi-Fi" width="16"></span>
            <span><img src="icons/switch.png" alt="Control Center" width="14"></span>
            <span id="mac-clock">Wed 11 Mar 12:00 AM</span>
        </div>
    </nav>

    <nav class="dock_bar" id="mac-dock">
        <span data-title="🚧Finder🚧"><img src="icons/finder_icon.png" alt="Finder Icon"></span>
        <span data-title="🚧CV🚧"><img src="icons/notes_icon.png" alt="Notes Icon"></span>
        <span data-title="🚧Photos🚧"><img src="icons/photos_icon.png" alt="Photos Icon"></span>
        <span data-title="Fav Songs"><img src="icons/spotify_icon.png" alt="Spotify Icon"></span>
        <span data-title="Roblox Projects"><img src="icons/roblox_icon.png" alt="Roblox Icon"></span>
        <span data-title="Github"><img src="icons/github_icon.png" alt="Github Icon"></span>
        <span data-title="Linked In"><img src="icons/linkedin_icon.png" alt="Linkedin Icon"></span>
        <span data-title="Instagram"><img src="icons/instagram_icon.png" alt="Instagram Icon"></span>
        <span data-title="Gmail"><img src="icons/gmail_icon.png" alt="Gmail Icon"></span>
        <span data-title="🚧Junk🚧"><img src="icons/bin_icon.png" alt="Bin Icon"></span>
    </nav>
    <script src="script.js"></script>
</body>
</html>
